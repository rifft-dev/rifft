<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0c0a14"/>
      <stop offset="100%" stop-color="#050408"/>
    </radialGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ge" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="blurMd" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow centre -->
  <ellipse cx="600" cy="270" rx="300" ry="260" fill="url(#gc)" filter="url(#blur)"/>
  <ellipse cx="200" cy="400" rx="240" ry="200" fill="url(#ge)" filter="url(#blur)"/>

  <!-- Abstract: a web of threads radiating and intersecting — like a failure propagation map -->
  <!-- Long diagonal threads across the canvas -->
  <line x1="0" y1="420" x2="600" y2="80" stroke="#7c3aed" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="460" x2="700" y2="120" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
  <line x1="0" y1="380" x2="550" y2="60" stroke="#7c3aed" stroke-width="1.5" opacity="0.15"/>
  <line x1="60" y1="500" x2="680" y2="100" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>

  <line x1="1200" y1="400" x2="600" y2="80" stroke="#7c3aed" stroke-width="1" opacity="0.18"/>
  <line x1="1200" y1="440" x2="500" y2="110" stroke="#7c3aed" stroke-width="0.5" opacity="0.12"/>
  <line x1="1140" y1="480" x2="520" y2="90" stroke="#7c3aed" stroke-width="1.5" opacity="0.15"/>

  <!-- Horizontal threads -->
  <line x1="0" y1="220" x2="1200" y2="260" stroke="#7c3aed" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="280" x2="1200" y2="310" stroke="#7c3aed" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="340" x2="1200" y2="360" stroke="#7c3aed" stroke-width="0.5" opacity="0.07"/>

  <!-- Threads converging from edges toward a central region — the handoff point -->
  <line x1="0" y1="180" x2="580" y2="290" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="240" x2="570" y2="280" stroke="#a855f7" stroke-width="1.5" opacity="0.22"/>
  <line x1="0" y1="300" x2="565" y2="285" stroke="#a855f7" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="360" x2="575" y2="295" stroke="#a855f7" stroke-width="0.5" opacity="0.14"/>

  <line x1="1200" y1="180" x2="640" y2="285" stroke="#a855f7" stroke-width="1" opacity="0.18"/>
  <line x1="1200" y1="250" x2="640" y2="278" stroke="#a855f7" stroke-width="1.5" opacity="0.22"/>
  <line x1="1200" y1="320" x2="640" y2="292" stroke="#a855f7" stroke-width="1" opacity="0.18"/>
  <line x1="1200" y1="390" x2="650" y2="300" stroke="#a855f7" stroke-width="0.5" opacity="0.12"/>

  <!-- From bottom -->
  <line x1="300" y1="630" x2="590" y2="300" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <line x1="500" y1="630" x2="598" y2="302" stroke="#a855f7" stroke-width="1.5" opacity="0.25"/>
  <line x1="700" y1="630" x2="608" y2="298" stroke="#a855f7" stroke-width="1" opacity="0.2"/>
  <line x1="900" y1="630" x2="618" y2="303" stroke="#a855f7" stroke-width="0.5" opacity="0.14"/>

  <!-- From top -->
  <line x1="200" y1="0" x2="586" y2="278" stroke="#a855f7" stroke-width="0.5" opacity="0.14"/>
  <line x1="450" y1="0" x2="594" y2="276" stroke="#a855f7" stroke-width="1" opacity="0.18"/>
  <line x1="650" y1="0" x2="606" y2="274" stroke="#a855f7" stroke-width="1" opacity="0.18"/>
  <line x1="900" y1="0" x2="614" y2="280" stroke="#a855f7" stroke-width="0.5" opacity="0.14"/>

  <!-- The node — where the threads meet — small, precise, bright -->
  <circle cx="600" cy="288" r="28" fill="#0c0a14" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  <circle cx="600" cy="288" r="5" fill="#a855f7" opacity="0.9"/>
  <circle cx="600" cy="288" r="16" fill="#7c3aed" opacity="0.06" filter="url(#blurMd)"/>

  <!-- Fragmentation — some threads break off and dissolve to the right -->
  <line x1="614" y1="286" x2="780" y2="240" stroke="#dc2626" stroke-width="1" opacity="0.22"/>
  <line x1="614" y1="290" x2="820" y2="310" stroke="#dc2626" stroke-width="1.5" opacity="0.28"/>
  <line x1="616" y1="294" x2="760" y2="360" stroke="#dc2626" stroke-width="1" opacity="0.2"/>
  <line x1="614" y1="282" x2="900" y2="200" stroke="#dc2626" stroke-width="0.5" opacity="0.12"/>
  <line x1="616" y1="298" x2="950" y2="400" stroke="#dc2626" stroke-width="0.5" opacity="0.1"/>

  <!-- Text -->
  <text x="80" y="538" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="400" fill="#4b5563" letter-spacing="0.14em">RIFFT · SYSTEMS GUIDE</text>
  <text x="80" y="572" font-family="system-ui,-apple-system,sans-serif" font-size="22" font-weight="500" fill="#e5e7eb" letter-spacing="-0.02em">Understanding agent handoff failures in multi-agent systems</text>
</svg>
