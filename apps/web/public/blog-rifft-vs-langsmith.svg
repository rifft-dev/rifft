<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#05050a"/>
    </radialGradient>
    <radialGradient id="gLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#334155" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="blurSm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient colour pools -->
  <ellipse cx="320" cy="310" rx="380" ry="300" fill="url(#gLeft)" filter="url(#blur)"/>
  <ellipse cx="880" cy="310" rx="380" ry="300" fill="url(#gRight)" filter="url(#blur)"/>
  <ellipse cx="600" cy="315" rx="160" ry="200" fill="url(#gCenter)" filter="url(#blur)"/>

  <!-- Subtle grid — left panel -->
  <line x1="100" y1="140" x2="540" y2="140" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="180" x2="540" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="220" x2="540" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="260" x2="540" y2="260" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="300" x2="540" y2="300" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="340" x2="540" y2="340" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="380" x2="540" y2="380" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="420" x2="540" y2="420" stroke="#ffffff" stroke-width="1" opacity="0.04"/>
  <line x1="100" y1="460" x2="540" y2="460" stroke="#ffffff" stroke-width="1" opacity="0.04"/>

  <!-- Subtle grid — right panel -->
  <line x1="660" y1="140" x2="1100" y2="140" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="180" x2="1100" y2="180" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="220" x2="1100" y2="220" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="260" x2="1100" y2="260" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="300" x2="1100" y2="300" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="340" x2="1100" y2="340" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="380" x2="1100" y2="380" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="420" x2="1100" y2="420" stroke="#ffffff" stroke-width="1" opacity="0.03"/>
  <line x1="660" y1="460" x2="1100" y2="460" stroke="#ffffff" stroke-width="1" opacity="0.03"/>

  <!-- Left panel: Rifft — trace chain with fork/replay accent -->
  <!-- Trace nodes -->
  <circle cx="160" cy="240" r="10" fill="#7c3aed" opacity="0.9"/>
  <circle cx="260" cy="240" r="10" fill="#7c3aed" opacity="0.9"/>
  <circle cx="360" cy="240" r="10" fill="#7c3aed" opacity="0.9"/>
  <circle cx="460" cy="240" r="10" fill="#dc2626" opacity="0.85"/>
  <!-- Connecting lines -->
  <line x1="170" y1="240" x2="250" y2="240" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="270" y1="240" x2="350" y2="240" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="370" y1="240" x2="450" y2="240" stroke="#dc2626" stroke-width="1.5" opacity="0.55" stroke-dasharray="4 3"/>
  <!-- Fork line going down — replay -->
  <line x1="360" y1="250" x2="360" y2="310" stroke="#7c3aed" stroke-width="1.5" opacity="0.45" stroke-dasharray="3 3"/>
  <circle cx="360" cy="320" r="8" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.65"/>
  <line x1="368" y1="320" x2="460" y2="320" stroke="#7c3aed" stroke-width="1.5" opacity="0.45" stroke-dasharray="4 3"/>
  <circle cx="468" cy="320" r="8" fill="#16a34a" opacity="0.75"/>
  <!-- Small labels -->
  <text x="160" y="222" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.28" text-anchor="middle">planner</text>
  <text x="260" y="222" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.28" text-anchor="middle">researcher</text>
  <text x="360" y="222" font-family="monospace" font-size="9" fill="#ffffff" opacity="0.28" text-anchor="middle">writer</text>
  <text x="460" y="222" font-family="monospace" font-size="9" fill="#dc2626" opacity="0.5" text-anchor="middle">fatal</text>
  <text x="468" y="337" font-family="monospace" font-size="9" fill="#16a34a" opacity="0.55" text-anchor="middle">replayed ✓</text>
  <!-- MAST badge -->
  <rect x="108" y="370" width="160" height="28" rx="6" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
  <text x="188" y="389" font-family="monospace" font-size="10" fill="#a78bfa" opacity="0.8" text-anchor="middle">MAST · fork-and-replay</text>
  <!-- Left label -->
  <text x="320" y="480" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.18" text-anchor="middle" letter-spacing="0.08em">RIFFT</text>

  <!-- Centre divider -->
  <line x1="600" y1="100" x2="600" y2="530" stroke="#ffffff" stroke-width="1" opacity="0.1"/>
  <!-- VS pill -->
  <rect x="572" y="293" width="56" height="28" rx="14" fill="#1a1a2e" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <text x="600" y="312" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff" opacity="0.45" text-anchor="middle">vs</text>

  <!-- Right panel: LangSmith — prompt/dataset centric visual -->
  <!-- Dataset rows -->
  <rect x="670" y="192" width="380" height="26" rx="5" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1" opacity="0.6"/>
  <rect x="670" y="226" width="380" height="26" rx="5" fill="#1e293b" fill-opacity="0.4" stroke="#334155" stroke-width="1" opacity="0.4"/>
  <rect x="670" y="260" width="380" height="26" rx="5" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="1" opacity="0.3"/>
  <rect x="670" y="294" width="380" height="26" rx="5" fill="#1e293b" fill-opacity="0.2" stroke="#334155" stroke-width="1" opacity="0.2"/>
  <!-- Row content -->
  <text x="688" y="210" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0.7">run_id: 4f2a…   status: fail   tokens: 3,821</text>
  <text x="688" y="244" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0.55">run_id: 81cc…   status: ok    tokens: 2,104</text>
  <text x="688" y="278" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0.4">run_id: a7d9…   status: ok    tokens: 1,987</text>
  <text x="688" y="312" font-family="monospace" font-size="9" fill="#94a3b8" opacity="0.3">run_id: 3bb1…   status: fail   tokens: 4,412</text>
  <!-- Prompt playground accent -->
  <rect x="670" y="342" width="180" height="60" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <text x="688" y="360" font-family="monospace" font-size="8" fill="#64748b" opacity="0.7">system prompt</text>
  <text x="688" y="376" font-family="monospace" font-size="8" fill="#94a3b8" opacity="0.5">You are a helpful agent…</text>
  <text x="688" y="392" font-family="monospace" font-size="8" fill="#475569" opacity="0.4">▌</text>
  <!-- Right label -->
  <text x="880" y="480" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff" opacity="0.14" text-anchor="middle" letter-spacing="0.08em">LANGSMITH</text>

  <!-- Top headline text -->
  <text x="600" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#ffffff" opacity="0.82" text-anchor="middle" letter-spacing="-0.02em">Rifft vs LangSmith</text>
  <text x="600" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#ffffff" opacity="0.32" text-anchor="middle" letter-spacing="0.04em">Multi-agent debugging comparison</text>
</svg>
